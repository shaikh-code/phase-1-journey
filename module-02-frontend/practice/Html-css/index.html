<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Layout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <nav class="nav">
      <h2 class="logo">Logo</h2>
      <div class="links">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
      </div>
    </nav>
  </header>

  <main>

    <section id="about" class="section">
      <h1>Abdul Moiz</h1>
      <p>Aspiring AI Engineer, learning frontend step by step.</p>
    </section>

    <section id="projects" class="section">
      <h2>Projects</h2>

      <div class="cards">

        <article class="card">
          <h3>AI Document Assistant</h3>
          <p>Simple PDF Q&A tool.</p>
          <button>View Project</button>
        </article>

        <article class="card">
          <h3>Weather App</h3>
          <p>Shows live weather data.</p>
          <button>View Project</button>
        </article>

        <article class="card">
          <h3>CV Maker</h3>
          <p>Generate CV easily.</p>
          <button>View Project</button>
        </article>

      </div>
    </section>

  </main>

  <footer class="footer">
    <p>© 2026 Abdul Moiz</p>
  </footer>

</body>
</html>
